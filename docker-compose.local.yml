  #     POSTGRES_DB: cpay_local
  #     POSTGRES_USER: cpay_user
  #     POSTGRES_PASSWORD: cpay_password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - cpay-local-network

  # Optional: Add Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - cpay-local-network

networks:
  cpay-local-network:
    driver: bridge

volumes:
