name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  verify-root:
    name: Verify root app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build

  verify-functions:
    name: Verify functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Lint functions
        run: cd functions && npm run lint

      - name: Test functions
        run: cd functions && npm test -- --watchAll=false

      - name: Build functions
        run: cd functions && npm run build

  credential-hygiene:
    name: Credential hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block tracked local secret files
        run: |
          ! find . -path './node_modules' -prune -o -name '.env' -print | grep .
          ! find . -path './node_modules' -prune -o -name 'serviceAccountKey.json' -print | grep .
          ! grep -R "sk_live_" . --exclude-dir=node_modules --exclude-dir=.git
          ! grep -R "BEGIN PRIVATE KEY" . --exclude-dir=node_modules --exclude-dir=.git
